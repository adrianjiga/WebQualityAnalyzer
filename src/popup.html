<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>
  <div class="header">
    <h1>Web Quality Analyzer</h1>
  </div>
  
  <div class="controls">
    <div class="btn-group">
      <button id="analyze-btn">Analyze Page</button>
      <button id="export-btn" class="btn-secondary" disabled>Export</button>
    </div>
    <div class="page-info" id="page-info" style="display: none;">
      <div class="page-url" id="page-url"></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="overview">Overview</div>
    <div class="tab" data-tab="accessibility">A11y</div>
    <div class="tab" data-tab="seo">SEO</div>
    <div class="tab" data-tab="performance">Perf</div>
    <div class="tab" data-tab="settings">Settings</div>
  </div>

  <div id="overview-tab" class="tab-content active">
    <div class="empty-state">
      Click "Analyze Page" to start quality analysis
    </div>
  </div>

  <div id="accessibility-tab" class="tab-content">
    <div class="empty-state">
      No accessibility data available
    </div>
  </div>

  <div id="seo-tab" class="tab-content">
    <div class="empty-state">
      No SEO data available
    </div>
  </div>

  <div id="performance-tab" class="tab-content">
    <div class="empty-state">
      No performance data available
    </div>
  </div>

  <div id="settings-tab" class="tab-content">
    <div class="empty-state">
      <div class="empty-state-icon">⚙️</div>
      <div class="empty-state-text">Settings coming soon</div>
    </div>
  </div>

  <script src="popup.bundle.js"></script>
</body>
</html>
